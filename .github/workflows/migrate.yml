name: Database migrations

# Applies Supabase SQL migrations, then Prisma migrations, against the linked hosted project.
#
# Secrets:
#   DATABASE_URL — Postgres connection string (direct). Same as Vercel / Prisma.
#   SUPABASE_PROJECT_REF — Project ID from Dashboard → Project Settings → General (e.g. "abcdxyz").
#   SUPABASE_ACCESS_TOKEN — MUST be a Supabase *account* Personal Access Token (format "sbp_...").
#     Create at: https://supabase.com/dashboard/account/tokens
#     Do NOT use the project's "service_role" or "anon" API keys (JWT) — those are for app runtime, not the CLI.

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "supabase/migrations/**"
      - "apps/web/prisma/migrations/**"

concurrency:
  group: migrate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Supabase link and push
        run: |
          set -euo pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Prisma migrate deploy
        working-directory: apps/web
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npm ci
          npx prisma migrate deploy
