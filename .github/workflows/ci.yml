name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web:
    name: apps/web
    runs-on: ubuntu-latest
    env:
      # Placeholders for `next build` / "Collecting page data" — no real services in CI.
      # auth.ts throws if SUPABASE_* missing; other modules match apps/web/.env.example.
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-supabase-service-role-not-used-in-ci
      AUTH_SECRET: ci-build-auth-secret-must-be-at-least-32-characters-long
      AI_CONFIG_SECRET: ci-build-ai-config-secret-at-least-32-characters-long-xx
      MINIAPP_JWT_SECRET: ci-build-miniapp-jwt-secret-at-least-16
      RULE_ENGINE_URL: http://127.0.0.1:8000
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx prisma validate
      - run: npm run build

  miniapp:
    name: apps/miniapp
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/miniapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/miniapp/package-lock.json
      - run: npm ci
      - run: npm run build:h5

  rule_engine:
    name: services/rule_engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/rule_engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest
