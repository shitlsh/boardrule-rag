name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web:
    name: apps/web
    runs-on: ubuntu-latest
    env:
      # prisma.config.ts requires DATABASE_URL when prisma generate runs (npm ci postinstall).
      # No database is reachable in CI — placeholder URL is enough for client generation / validate.
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx prisma validate
      - run: npm run build

  miniapp:
    name: apps/miniapp
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/miniapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/miniapp/package-lock.json
      - run: npm ci
      - run: npm run build:h5

  rule_engine:
    name: services/rule_engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/rule_engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest
